<style>
  :root{

  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:radial-gradient(1200px 600px at 50% -10%, var(--night-soft), var(--night));min-height:100vh;}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{width:100%;max-width:520px;background:var(--paper);border-radius:4px;border:1px solid var(--paper-line);padding:36px 34px;box-shadow:0 30px 60px rgba(0,0,0,.35);}
  .eyebrow{margin:0;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;color:var(--teal);text-transform:uppercase;}

  h1{font-size:28px;font-weight:600;line-height:1.25;}
  h2{font-size:20px;font-weight:500;line-height:1.5;}
  p{color:var(--ink-soft);font-size:14.5px;line-height:1.6;margin:0 0 20px;}
  label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
  input[type=text],input[type=password],textarea{
    width:100%;padding:12px 14px;font-size:15px;border-radius:3px;border:1px solid var(--paper-line);
    background:#FFFDF8;color:var(--ink);outline:none;font-family:'Inter',sans-serif;
  }
  textarea{resize:vertical;line-height:1.6;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;border-radius:3px;}
  .btn-primary{width:100%;padding:13px 0;font-size:15px;font-weight:600;color:#FFFDF8;background:var(--ink);margin-top:18px;}
  .btn-primary:disabled{background:#B9B4A6;cursor:not-allowed;}
  .btn-ghost{background:none;color:var(--ink-soft);font-size:12.5px;text-decoration:underline;}
  .row{display:flex;justify-content:space-between;align-items:center;}
  .timer{display:flex;align-items:center;gap:10px;}
  .dial{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold);position:relative;flex-shrink:0;}
  .dial .hand{position:absolute;top:50%;left:50%;width:1.5px;height:12px;background:var(--gold);transform-origin:top;transition:transform .9s linear;}
  .dial .dot{position:absolute;top:50%;left:50%;width:4px;height:4px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);}
  #timerDisplay{font-family:'IBM Plex Mono',monospace;font-size:18px;color:var(--ink);min-width:52px;}
  .qtag{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--teal);}
  .dots{display:flex;gap:5px;}
  .dots span{width:6px;height:6px;border-radius:50%;background:var(--paper-line);display:inline-block;}
  .dots span.done{background:var(--gold);}
  .dots span.cur{background:var(--ink);}
  .err{color:#B3432B;font-size:13px;margin:-10px 0 14px;}
  .admin-wrap{padding:32px 20px;}
  .admin-inner{max-width:800px;margin:0 auto;}
  .admin-inner h2{color:#F7F2E7;font-size:24px;margin:0;}
  .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .btn-outline{padding:8px 16px;background:none;border:1px solid var(--teal);color:var(--teal);border-radius:3px;font-size:13px;}
  .btn-outline.muted{border-color:var(--paper-line);color:#F7F2E7;}
  .session{background:var(--paper);border-radius:4px;border:1px solid var(--paper-line);overflow:hidden;margin-bottom:10px;}
  .session-head{width:100%;text-align:left;padding:16px 20px;background:none;display:flex;justify-content:space-between;align-items:center;}
  .session-name{font-family:'Fraunces',serif;font-size:17px;color:var(--ink);font-weight:600;}
  .session-meta{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .session-body{padding:0 20px 18px;border-top:1px solid var(--paper-line);}
  .qa{margin-top:16px;}
  .qa-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .qa-text{font-size:13px;color:var(--ink);margin:4px 0 8px;line-height:1.5;white-space:pre-wrap;}
  .muted-note{color:#9aa0b0;}
</style>
