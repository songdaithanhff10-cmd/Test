<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Kết Quả Khảo Sát Tâm Lý</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 700px;
            width: 100%;
            transition: all 0.3s ease;
        }
        h1 {
            color: #1a2a3a;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        p.subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
            font-size: 15px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button {
            padding: 14px 24px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            display: none;
            margin-top: 5px;
        }
        .result-container {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-btn {
            background-color: #7f8c8d;
            padding: 8px 16px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background-color: #95a5a6;
        }
        .content-text {
            line-height: 1.7;
            font-size: 16px;
            color: #34495e;
        }
        .content-text p {
            margin-bottom: 15px;
        }
        .section-good {
            border-left: 4px solid #2ecc71;
            background-color: #f4fbf7;
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 25px 0;
        }
        .section-bad {
            border-left: 4px solid #e74c3c;
            background-color: #fdf3f2;
            padding: 20px;
            border-radius: 0 12px 12px 0;
            margin: 25px 0;
        }
        h2.section-title {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-good .section-title { color: #27ae60; }
        .section-bad .section-title { color: #c0392b; }
        h3 {
            font-size: 16px;
            color: #2c3e50;
            margin: 15px 0 8px 0;
        }
        ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        li {
            margin-bottom: 10px;
        }
        .blockquote {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            margin-top: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- KHỐI NHẬP TÊN -->
    <div class="card" id="searchCard">
        <h1>Hệ Thống Tra Cứu Kết Quả Khảo Sát</h1>
        <p class="subtitle">Vui lòng nhập chính xác tên của bạn để xem phản hồi</p>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Nhập tên tại đây..." onkeydown="if(event.key === 'Enter') handleSearch()">
            <button onclick="handleSearch()">Xem kết quả</button>
        </div>
        <div class="error-message" id="errorMsg">Không tìm thấy dữ liệu cho tên này. Gợi ý: Hãy thử nhập "Trâm Anh".</div>
    </div>

    <!-- KHỐI HIỂN THỊ KẾT QUẢ -->
    <div class="card result-container" id="resultCard">
        <button class="back-btn" onclick="goBack()">← Quay lại</button>
        <div class="content-text" id="resultContent">
            <!-- Nội dung phản hồi sẽ tự động điền vào đây -->
        </div>
    </div>

    <script>
        function handleSearch() {
            const inputVal = document.getElementById('nameInput').value.trim().toLowerCase();
            
            // Hỗ trợ kiểm tra cả khi viết có dấu hoặc không dấu cơ bản
            if (inputVal === "trâm anh" || inputVal === "tram anh") {
                document.getElementById('searchCard').style.display = 'none';
                document.getElementById('resultCard').style.display = 'block';
                renderContent();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function goBack() {
            document.getElementById('searchCard').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('nameInput').value = '';
        }

        function renderContent() {
            const contentHTML = `
                <h1>Chào Trâm Anh!</h1>
                <p>Tớ đã đọc hết những câu trả lời khảo sát rất thật lòng của cậu. Cảm giác đầu tiên của tớ là cậu giống như một cuốn sách hay: nhẹ nhàng, có chút khép kín ở bìa ngoài nhưng càng lật giở từng trang bên trong, người ta lại càng thấy bất ngờ vì sự sâu sắc và thế giới nội tâm cực kỳ phong phú của cậu.</p>
                <p>Dưới đây là những gì tớ "đọc vị" được về một cô gái tên Trâm Anh qua những gì cậu tự bạch nhé:</p>
                
                <!-- PHẦN ĐIỂM TỐT -->
                <div class="section-good">
                    <h2 class="section-title">✨ Góc Nhìn Tính Cách Nổi Bật</h2>
                    
                    <h3>1. Một tâm hồn hướng nội, "mít ướt" một cách lành mạnh</h3>
                    <p>Cậu tự nhận mình hướng nội, nhút nhát và thích giải tỏa mọi chuyện bằng nước mắt. Nhiều người hay nghĩ khóc là yếu đuối, nhưng tớ lại thấy ngược lại:</p>
                    <ul>
                        <li><strong>Biết cách tự chữa lành:</strong> Cậu chọn "ở một mình và ngồi khóc cho đã rồi thôi". Đây thực ra là một cơ chế giải tỏa cảm xúc rất thông minh. Cậu không trốn tránh, không kìm nén, mà để nỗi buồn trôi ra ngoài theo những giọt nước mắt rồi mỉm cười đón nhận vì biết "chuyện sẽ qua mà".</li>
                        <li><strong>Khao khát kết nối ngầm:</strong> Cậu ngại bắt chuyện không phải vì cậu lạnh lùng, mà chỉ vì cậu hơi rụt rè thôi. Thực chất, cậu rất muốn được trò chuyện, chia sẻ và thấu hiểu mọi người chứ không hề muốn cô lập bản thân.</li>
                    </ul>

                    <h3>2. Dễ tổn thương nhưng sở hữu "nội lực" cực kỳ bản lĩnh</h3>
                    <p>Đây là điểm tớ ấn tượng nhất ở cậu. Cậu thừa nhận mình là người nhạy cảm, thích nghe những lời nói tránh nhẹ nhàng để không bị buồn. Thế nhưng, đằng sau sự mỏng manh đó lại là một tư duy vô cùng chín chắn:</p>
                    <ul>
                        <li><strong>Tư duy cầu tiến (Growth Mindset):</strong> Cậu không hề bướng bỉnh hay bảo thủ. Cậu sẵn sàng chấp nhận một người bạn nói thẳng, vì cậu "hiểu và có thể sửa". Sức mạnh của cậu nằm ở chỗ cậu biết vượt qua sự tổn thương nhất thời của cái tôi để bản thân trở nên tốt hơn.</li>
                        <li><strong>Dũng cảm đối mặt với quá khứ:</strong> Khi đứng trước chiếc nút bấm xóa ký ức buồn, cậu đã chọn <strong>Không bấm</strong>. Cậu muốn "ghi nhớ nó và lấy nó làm bài học cho sau này". Việc cậu trân trọng cả những mảng tối, những vấp ngã trong đời chứng minh cậu là một cô gái có bản lĩnh và nghị lực lớn lao ẩn sau vẻ ngoài dịu dàng.</li>
                    </ul>

                    <h3>3. Thẳng thắn trong mối quan hệ và ghét sự "chiến tranh lạnh"</h3>
                    <p>Trong tình cảm hay các mối quan hệ quan trọng, cậu là người luôn hướng đến sự xây dựng và thấu hiểu:</p>
                    <ul>
                        <li>Cậu không thích kiểu im lặng bỏ lửng mâu thuẫn. Vì khi bị bỏ lại một mình, cậu rất dễ bị <strong>Overthinking</strong> (suy nghĩ quá mức), những suy nghĩ luẩn quẩn tự diễn dịch trong đầu sẽ làm cậu cực kỳ khó chịu.</li>
                        <li>Cậu luôn chọn cách ngồi lại đối thoại để "hiểu nhau và ổn hơn". Điều này cho thấy cậu cực kỳ coi trọng mối quan hệ và luôn muốn tìm giải pháp rõ ràng, văn minh để bảo vệ tình cảm của cả hai.</li>
                    </ul>

                    <div class="blockquote">
                        <strong>Lời nhắn gửi riêng cho Trâm Anh:</strong> Cậu là một sự kết hợp rất đáng quý giữa sự nhạy cảm, tinh tế của một cô gái và sự chín chắn, lý trí của một người trưởng thành. Cậu có lòng trắc ẩn (luôn sợ làm tổn thương người khác), biết nghĩ cho mọi người nhưng cũng rất có ý thức hoàn thiện chính mình. Đừng bao giờ tự ti vì mình hay khóc hay nhút nhát nhé, vì chính sự chân thành và nội lực ngầm đó mới là thứ tạo nên một Trâm Anh có sức hút rất riêng.
                    </div>
                </div>

                <!-- PHẦN ĐIỂM XẤU -->
                <div class="section-bad">
                    <h2 class="section-title">⚠️ Những Chiếc Bẫy Tâm Lý (Tác Dụng Phụ)</h2>
                    <p>Thực ra, một người có thế giới nội tâm sâu sắc và nhạy cảm như cậu thường sẽ phải đối mặt với những "tác dụng phụ" khá đau đầu. Nếu tụi mình thẳng thắn với nhau như những người bạn, thì đây là những điểm yếu — hay đúng hơn là những chiếc bẫy tâm lý mà cậu rất dễ tự sa vào:</p>
                    
                    <h3>1. Chiếc bẫy Overthinking và sự phụ thuộc cảm xúc khi có biến</h3>
                    <p>Cậu có xu hướng không chịu nổi việc phải ở một mình với những suy nghĩ ngổn ngang khi hai bên xảy ra mâu thuẫn ("ở một mình những suy nghĩ của bản thân làm mình rất khó chịu").</p>
                    <p><strong>Điểm yếu ở đây là:</strong> Vì sợ cảm giác bất an đó, cậu có xu hướng muốn nói chuyện ngay để giải tỏa. Nhưng nếu đối phương lại là kiểu người cần thời gian im lặng để bình tĩnh (nhóm né tránh), việc cậu thúc ép đối thoại sẽ vô tình tạo áp lực lớn cho họ. Cậu dễ bị rơi vào trạng thái hoảng loạn, suy diễn lung tung và tự làm khổ tâm lý của chính mình trước khi vấn đề thực sự được giải quyết.</p>

                    <h3>2. Quá nhạy cảm dễ khiến người xung quanh phải "nhón chân" khi ở cạnh</h3>
                    <p>Cậu tự nhận mình "vốn dễ tổn thương" và hay giải quyết mọi chuyện bằng nước mắt.</p>
                    <p><strong>Điểm yếu ở đây là:</strong> Dù cậu nói rằng cậu sẵn sàng nghe lời nói thẳng để sửa đổi, nhưng phản ứng thực tế của cậu (buồn, khóc, tổn thương) có thể sẽ làm cho bạn bè hoặc người yêu cảm thấy áp lực. Họ sẽ có cảm giác phải "đi nhẹ, nói khẽ, cười duyên", lúc nào cũng phải lựa lời vì sợ làm cậu khóc. Sự nhạy cảm quá mức này đôi khi vô tình dựng lên một bức tường, khiến người khác e dè không dám hoàn toàn thành thật với cậu.</p>

                    <h3>3. Xu hướng "gặm nhấm" nỗi buồn và tự cô lập lúc đầu</h3>
                    <p>Khi gặp áp lực lớn, phản ứng đầu tiên của cậu là rút lui vào thế giới riêng ("ở một mình và ngồi khóc").</p>
                    <p><strong>Điểm yếu ở đây là:</strong> Việc khóc để giải tỏa là tốt, nhưng kết hợp với việc cậu chọn giữ lại tất cả ký ức buồn để làm bài học, cậu rất dễ biến thành kiểu người hay luyến tiếc và ôm giữ quá khứ. Cậu có xu hướng tua đi tua lại những tổn thương, những lỗi lầm cũ trong đầu để "rút kinh nghiệm", nhưng thực chất là đang tự làm đau bản thân thêm nhiều lần nữa. Sự nhút nhát ban đầu cũng dễ khiến cậu bỏ lỡ những cơ hội kết bạn tốt chỉ vì không dám bước qua vòng an toàn.</p>

                    <div class="blockquote" style="background: #fff; border-color: #ffa39e;">
                        <strong>Tóm lại là:</strong> "Điểm xấu" lớn nhất của Trâm Anh không phải là gây hại cho ai, mà là cậu đang tự làm khó và tự làm đau chính mình nhiều nhất. Cậu ôm đồm quá nhiều cảm xúc, giữ quá nhiều chuyện cũ và hơi thiếu một chút sự "vô tư, phớt lờ" để cuộc sống nhẹ nhàng hơn. Chút gai góc này có làm cậu thấy giống mình ở ngoài đời không?
                    </div>
                </div>
            `;
            document.getElementById('resultContent').innerHTML = contentHTML;
        }
    </script>
</body>
</html>
